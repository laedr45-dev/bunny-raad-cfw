<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قواعد الموقع</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>قواعد الموقع</h1>
    <p>يرجى قراءة القواعد بعناية</p>
  </header>

  <main class="rules-container">
    <section class="rule">
      <h2>1. الاحترام المتبادل</h2>
      <p>احترام الجميع وعدم استخدام أية لغة مسيئة أو مهينة.</p>
    </section>

    <section class="rule">
      <h2>2. المحتوى المناسب</h2>
      <p>منع نشر محتوى غير لائق أو مسروق.</p>
    </section>

    <section class="rule">
      <h2>3. عدم الانتهاك</h2>
      <p>عدم مشاركة أو تشجيع أي انتهاك لحقوق الملكية أو القوانين.</p>
    </section>

    <!-- تقدر تضيف أكثر من قسم هنا -->
  </main>

  <footer>
    <p>© 2026 جميع الحقوق محفوظة.</p>
  </footer>
</body>
</html>
